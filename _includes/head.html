<meta charset="utf-8">
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="author" content="{{ site.title }}">
<!-- Mobile Meta -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Favicon -->
<!-- link rel="shortcut icon" href="/images/favicon.ico" -->
<link rel="shortcut icon" href="/i/ILD_favicon.png">
<link rel="alternate" type="application/rss+xml" title="RSS Feed for {{ site.title }}" href="{{ site.url }}/rss.xml" />
<link rel="alternate" type="application/atom+xml" title="Atom Feed for {{ site.title }}" href="{{ site.url }}/atom.xml" />
